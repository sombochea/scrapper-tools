name: scrapper-tools

# ── Services ───────────────────────────────────────────────────────────────────
services:
  # ── FastAPI scraping backend ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: scrapper-tools-api:latest
    container_name: scrapper-tools-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Next.js web UI ────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: scrapper-tools-ui:latest
    container_name: scrapper-tools-ui
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      # Proxy rewrites /api/* → this URL inside the container network.
      # Change to your external API endpoint for non-Compose deployments.
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
